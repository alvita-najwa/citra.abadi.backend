<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citra Abadi - Produk</title>
    <!-- Perbaikan Path CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="shortcut icon" href="/static/img/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="/">
                    <!-- Perbaikan Path Gambar Logo -->
                    <img src="/static/img/logo.png" alt="Citra Abadi Logo" class="logo-img">
                    <span class="logo-text">CITRA ABADI</span>
                </a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <!-- Perbaikan Navigasi Link -->
                <a href="/" class="nav-link">Beranda</a>
                <a href="/about" class="nav-link">Tentang Kami</a>
                <a href="/product" class="nav-link active">Produk</a>
                <a href="/contact" class="nav-link">Kontak</a>
                <a href="/developer" class="nav-link">Developer</a>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Cari produk...">
                </div>
                <div class="cart-icon">
                    <a href="#" id="cart-toggle" aria-label="Lihat keranjang belanja">🛒 <span id="cart-count">0</span></a>
                </div>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Products Section -->
    <section class="products">
        <div class="container">
            <div class="section-title">
                <h1>Produk</h1>
            </div>
            <div class="products-grid" id="products-grid">
                <!-- Produk akan dimuat secara dinamis oleh main.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-info">
                <p>&copy; 2025 Citra Abadi. All rights reserved.</p>
                <p>Nglegok, Kab. Blitar | Telp: (+62) 813-3599-7984</p>
            </div>
            <div class="footer-dev">
                <p>Developed with ❤️ by <span class="dev-name">Kelompok 4</span> | <span class="subject">PWEB</span></p>
            </div>
        </div>
    </footer>

    <!-- Product Detail Modal -->
    <div class="product-modal" id="product-modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <!-- Elemen kunci yang harus ada agar main.js bisa bekerja -->
            <div id="modal-body">
            <!-- Isi form akan disuntikkan secara otomatis oleh main.js -->
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar" role="region" aria-label="Keranjang belanja">
        <div class="cart-header">
            <h3>Keranjang Belanja</h3>
            <button id="close-cart" aria-label="Tutup keranjang">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Item keranjang akan ditambahkan secara dinamis -->
        </div>
        <div class="cart-total">
            <p>Total: <span id="cart-total-price">Rp 0</span></p>
            <button class="btn-primary" id="checkout-btn">Beli Sekarang</button>
        </div>
    </div>

    <!-- Perbaikan Path JavaScript -->
    <script src="/static/js/main.js"></script>
</body>
</html>
